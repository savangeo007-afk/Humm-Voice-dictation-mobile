<svg id="humm-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" class="w-full h-auto">
<style>
    @keyframes drawStroke { to { stroke-dashoffset: 0; } }
    @keyframes fadeScaleUp { from { opacity: 0; transform: translateY(10px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .bubble-path { stroke: #FFFFFF; stroke-width: 12; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawStroke 1.2s ease-in-out forwards; }
    .wave-path { stroke: #FFFFFF; stroke-width: 10; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawStroke 1.2s ease-in-out 0.4s forwards; }
    .text-path { fill: #FFFFFF; opacity: 0; transform-origin: center; animation: fadeScaleUp 0.8s ease-out 1s forwards; }
</style>
                <!-- Icon: Speech Bubble Outline -->
